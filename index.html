<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Imposter — Word Game</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="wrap">
    <div class="game-title">Imposter — word game</div>

    <div class="section-label">Number of players</div>
    <div class="player-count-row" id="countRow"></div>

    <div class="section-label">Difficulty</div>
    <div class="mode-row">
      <button class="mode-btn" id="mEasy" onclick="setMode('easy')">
        Easy
      </button>
      <button class="mode-btn" id="mMed" onclick="setMode('medium')">
        Medium
      </button>
      <button class="mode-btn" id="mHard" onclick="setMode('hard')">
        Hard
      </button>
    </div>
    <div class="mode-desc" id="modeDesc"></div>

    <div class="divider"></div>

    <div class="players-section">
      <div class="section-label" style="margin-bottom: 12px;">players</div>
      <div class="player-list" id="playerList"></div>
    </div>

    <button class="start-btn" id="startBtn" onclick="startGame()">start game</button>
    <div class="loading-msg" id="loadingMsg"></div>
  </div>

  <script src="config.js"></script>
  <script src="words.js"></script>
  <script src="script.js"></script>

</body>
</html>
